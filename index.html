<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Cochlear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: oklch(0.96 0.005 80);
      }
      body {
        font-family:
          "DM Sans",
          system-ui,
          -apple-system,
          sans-serif;
        color: #2a2520;
        -webkit-font-smoothing: antialiased;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      #root {
        min-height: 100%;
      }
      .material-symbols-rounded {
        font-family: "Material Symbols Rounded";
        font-weight: normal;
        font-style: normal;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
      }
      button:focus-visible {
        outline: 2px solid oklch(0.62 0.15 240);
        outline-offset: 2px;
      }
      @keyframes omSlideInRight {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }
      @keyframes omSlideOutRight {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(100%);
        }
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script>
      // Tweak defaults — host rewrites this block on disk when values change.
      window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
        mood: "daylight",
        backdrop: "pebbles",
        accent: ["#e0a23b", "#7a4f15"],
      } /*EDITMODE-END*/;
    </script>
  </head>
  <body style="cursor: pointer">
    <div id="root"></div>
    <script
      type="text/babel"
      data-presets="react"
      src="tweaks-panel.jsx"
    ></script>
    <script type="text/babel" data-presets="react" src="app.jsx"></script>
  </body>
</html>
